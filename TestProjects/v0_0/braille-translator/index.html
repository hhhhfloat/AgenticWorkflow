<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盲文翻译器 - Braille Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- 左侧：盲文格子 -->
  <div class="braille-section">
    <span class="braille-label">✻ 盲文点字格</span>
    <div class="braille-grid" id="brailleGrid">
      <!-- 点1: 左上 -->
      <div class="dot" data-dot="1" title="点 1"></div>
      <!-- 点4: 右上 -->
      <div class="dot" data-dot="4" title="点 4"></div>
      <!-- 点2: 左中 -->
      <div class="dot" data-dot="2" title="点 2"></div>
      <!-- 点5: 右中 -->
      <div class="dot" data-dot="5" title="点 5"></div>
      <!-- 点3: 左下 -->
      <div class="dot" data-dot="3" title="点 3"></div>
      <!-- 点6: 右下 -->
      <div class="dot" data-dot="6" title="点 6"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnClear">✕ 清空</button>
      <button class="btn" id="btnFillAll">◉ 全选</button>
    </div>
  </div>

  <!-- 右侧：结果展示 -->
  <div class="result-section">
    <span class="result-label">对应字母</span>
    <div class="letter-display" id="letterDisplay">—</div>
    <div class="braille-unicode" id="brailleUnicode"></div>
    <div class="dot-pattern-text" id="dotPattern"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
