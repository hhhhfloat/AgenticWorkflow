<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔵 弹球捕捉 · Bounce & Catch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- 积分面板 -->
    <div class="score-panel">
        <span class="score-label">🏆 积分</span>
        <span class="score-value" id="scoreValue">0</span>
        <span class="score-target">目标：<span>3000</span> 💥</span>
    </div>

    <!-- 速度指示器 -->
    <div class="speed-indicator">
        <div class="speed-dot" id="speedDot"></div>
        <span class="speed-text" id="speedText">等待中…</span>
    </div>

    <!-- 操作提示 -->
    <div class="hint" id="hint">🖱 点击球来抓住它 · 速度越快积分越多</div>

    <!-- 爆炸覆盖层 -->
    <div class="explosion-overlay" id="explosionOverlay">
        <div class="explosion-message">
            <div class="explosion-emoji">💥</div>
            <div class="explosion-title">球 爆 炸 了！</div>
            <div class="explosion-sub" id="finalScore">最终积分：0</div>
            <button class="explosion-btn" id="restartBtn">🔄 再来一局</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
