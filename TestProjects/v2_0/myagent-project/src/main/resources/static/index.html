<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>本地 Agent 工作台</title>
    <!-- @anchor: html_head -->
    <script src="marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- @anchor: html_header -->
    <h2>Agentic 工作台</h2>

    <!-- @anchor: html_input -->
    <textarea id="prompt" placeholder="输入你的需求，例如：写一个 HTML 计算器，支持加减乘除">写一个 HTML 计算器，支持加减乘除</textarea>

    <!-- @anchor: html_history -->
    <div id="historyContainer"></div>

    <!-- @anchor: html_buttons -->
    <div style="margin-top:8px; display:flex; gap:10px; flex-wrap:wrap;">
        <button id="runBtn">▶ 运行</button>
        <button id="stopBtn" disabled>⏹ 停止</button>
        <button id="clearBtn" style="background:#555;">🗑 清空</button>
    </div>

    <!-- @anchor: html_projects -->
    <div style="margin-top:12px;">
        <button id="toggleProjectsBtn" style="background:#444; width:100%; text-align:left; padding:8px 12px;">
            📂 历史成型项目 (点击展开)
        </button>
        <div id="projectsContainer" style="display:none; margin-top:4px; background:#252526; border:1px solid #444; border-radius:4px; padding:8px; max-height:300px; overflow-y:auto;">
            <div id="projectsList">加载中...</div>
        </div>
    </div>

    <!-- @anchor: html_output -->
    <div id="output">等待输入...</div>

    <!-- @anchor: html_scripts -->
    <script src="script.js"></script>
</body>
</html>
