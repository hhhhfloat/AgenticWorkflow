<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭开销追踪器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- @anchor: header -->
        <header>
            <h1>🏠 家庭开销追踪器</h1>
            <p class="subtitle">记录每一笔支出，掌控家庭财务</p>
        </header>

        <!-- @anchor: expense_form -->
        <section class="card form-section">
            <h2>📝 添加开销记录</h2>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseName">名称</label>
                        <input type="text" id="expenseName" placeholder="例如：超市购物" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseAmount">金额 (¥)</label>
                        <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseCategory">分类</label>
                        <select id="expenseCategory" required>
                            <option value="">请选择分类</option>
                            <option value="餐饮">🍽️ 餐饮</option>
                            <option value="交通">🚗 交通</option>
                            <option value="住房">🏡 住房</option>
                            <option value="娱乐">🎮 娱乐</option>
                            <option value="购物">🛒 购物</option>
                            <option value="医疗">💊 医疗</option>
                            <option value="教育">📚 教育</option>
                            <option value="其他">📦 其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="expenseDate">日期</label>
                        <input type="date" id="expenseDate" required>
                    </div>
                    <button type="submit" class="btn btn-primary">➕ 添加记录</button>
                </div>
            </form>
        </section>

        <!-- @anchor: summary_section -->
        <section class="card summary-section">
            <h2>📊 开销概览</h2>
            <div class="summary-cards" id="summaryCards">
                <div class="summary-item">
                    <span class="summary-label">总支出</span>
                    <span class="summary-value" id="totalExpense">¥0.00</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">记录数</span>
                    <span class="summary-value" id="recordCount">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">平均每笔</span>
                    <span class="summary-value" id="avgExpense">¥0.00</span>
                </div>
            </div>
        </section>

        <!-- @anchor: chart_section -->
        <section class="card chart-section">
            <div class="chart-header">
                <h2>📈 分类统计柱状图</h2>
                <span class="hint">纯 CSS 柱状图</span>
            </div>
            <div class="chart-container" id="chartContainer">
                <p class="empty-hint">暂无数据，添加记录后将显示柱状图</p>
            </div>
        </section>

        <!-- @anchor: table_section -->
        <section class="card table-section">
            <div class="table-header">
                <h2>📋 所有记录</h2>
                <div class="table-actions">
                    <span class="record-hint" id="recordHint"></span>
                    <!-- @anchor: clear_all_btn -->
                    <button id="clearAllBtn" class="btn btn-danger">🗑️ 清空所有数据</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="expenseTable">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>金额 (¥)</th>
                            <th>分类</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTableBody">
                        <tr class="empty-row">
                            <td colspan="5">暂无记录，快来添加第一笔开销吧！</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- @anchor: footer -->
        <footer>
            <p>数据自动保存至浏览器本地存储 (localStorage)</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
