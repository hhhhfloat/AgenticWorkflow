<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>本地 Agent 工作台</title>
    <!-- @anchor: html_head -->
    <script src="marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- ===== 侧边栏 ===== -->
    <div id="sidebar">
        <div id="sidebarHeader">
            <span>📁 文件浏览器</span>
            <button id="toggleSidebarBtn" title="折叠侧边栏">◀</button>
        </div>
        <div id="sidebarContent">
            <div class="tree-root" data-path="sandbox">📂 sandbox</div>
            <div class="tree-root" data-path="TestProjects">📂 TestProjects</div>
        </div>
    </div>

    <!-- ===== 主工作区 ===== -->
    <div id="main">
        <h2>Agentic 工作台</h2>

        <textarea id="prompt" placeholder="输入你的需求，例如：写一个 HTML 计算器，支持加减乘除">写一个 HTML 计算器，支持加减乘除</textarea>

        <div id="historyContainer"></div>

        <div style="display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
            <label for="maxIterations" style="color:#d4d4d4; font-size:14px;">🔄 最大迭代次数：</label>
            <input type="number" id="maxIterations" value="20" min="1" max="50"
                   style="width:70px; background:#2d2d2d; color:#fff; border:1px solid #444; padding:4px 8px; border-radius:4px; font-size:14px;">
            <span style="color:#888; font-size:12px;">（1-50）</span>
        </div>

        <div style="margin-top:8px; display:flex; gap:10px; flex-wrap:wrap;">
            <button id="runBtn">▶ 运行</button>
            <button id="stopBtn" disabled>⏹ 停止</button>
            <button id="clearBtn" style="background:#555;">🗑 清空</button>
        </div>

        <div id="output">等待输入...</div>
    </div>
</div>

<!-- 引入文案列表 -->
<script src="tips.js"></script>
<!-- 主脚本 -->
<script src="script.js"></script>
</body>
</html>
